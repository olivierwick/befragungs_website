<style>
    :root {
        --linie: 8px solid #ff009d;
        --fs: 46px;
        --pad: 1px 14px;
    }

    @font-face {
        font-family: 'Ronzino';
        src: url('Ronzino-Regular.otf') format('opentype');
        font-weight: normal;
        font-style: normal;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
        background: white;
        height: 100%;
        overflow: hidden;
        font-family: 'Ronzino', Helvetica, Arial, sans-serif;
    }

    #frame { height: 100%; overflow: hidden; position: relative; }

    @keyframes einblenden { from { opacity: 0; } to { opacity: 1; } }
    @keyframes langEinblenden { from { opacity: 0; } to { opacity: 1; } }
    @keyframes cursor-puls { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes wackeln {
        0%   { transform: rotate(0deg); }
        15%  { transform: rotate(-8deg); }
        35%  { transform: rotate(8deg); }
        55%  { transform: rotate(-5deg); }
        75%  { transform: rotate(5deg); }
        100% { transform: rotate(0deg); }
    }

    #InfoButton {
        position: fixed;
        top: max(0px, env(safe-area-inset-top));
        left: 20px;
        right: 20px;
        border-bottom: var(--linie);
        text-align: center;
        padding: var(--pad);
        font-size: var(--fs);
        color: #ff009d;
        background: white;
        cursor: pointer;
        z-index: 10;
    }

    #LangButton {
        position: fixed;
        bottom: max(0px, env(safe-area-inset-bottom));
        left: 20px;
        right: 20px;
        border-top: var(--linie);
        text-align: center;
        padding: var(--pad);
        font-size: var(--fs);
        color: #ff009d;
        background: white;
        cursor: pointer;
        z-index: 10;
    }

    #container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
    }

    #content {
        display: flex;
        flex-direction: column;
        width: calc(100% - 40px);
    }

    #frage-nav {
        border-top: var(--linie);
        border-bottom: var(--linie);
        padding: 1px 0;
        font-size: var(--fs);
        color: #ff009d;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 90px;
        cursor: pointer;
        user-select: none;
    }

    #frage-prev, #frage-next {
        display: block;
        height: 1.3em;
        width: 1.3em;
        object-fit: contain;
        filter: brightness(0) saturate(100%) invert(27%) sepia(96%) saturate(7445%) hue-rotate(307deg);
        flex-shrink: 0;
    }
    #frage-prev { transform: rotate(180deg); }
    #container[dir="rtl"] #frage-prev { transform: rotate(0deg); }
    #container[dir="rtl"] #frage-next { transform: rotate(180deg); }

    #Frage1 {
        padding: 3px 14px;
        font-size: var(--fs);
        color: #ff009d;
        text-align: center;
        line-height: 1;
    }

    #eingabe-wrapper {
        position: relative;
        border-top: var(--linie);
        border-bottom: var(--linie);
        overflow: hidden;
    }

    #Eingabe {
        background: transparent;
        border: none;
        outline: none;
        padding: 49px 14px 3px;
        font-size: var(--fs);
        font-family: 'Ronzino', Helvetica, Arial, sans-serif;
        line-height: 1;
        color: #ff009d;
        caret-color: transparent;
        width: 100%;
        resize: none;
        overflow: hidden;
        height: 144px;
        text-align: center;
        display: block;
    }

    #cursor-bar {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 10px;
        height: 90px;
        background: #ff009d;
        border-radius: 20px;
        animation: cursor-puls 2.2s ease-in-out infinite;
        pointer-events: none;
        z-index: 1;
        transition: height 0.2s ease;
        will-change: opacity;
    }

    #Submit {
        display: flex;
        justify-content: center;
        align-items: center;
        border-bottom: var(--linie);
        padding: var(--pad);
        font-size: var(--fs);
        color: #ff009d;
        text-align: center;
        cursor: pointer;
        white-space: nowrap;
    }

    #pfeil-phantom {
        display: inline-block;
        height: 1.3em;
        width: 1.3em;
        margin-right: 8px;
        flex-shrink: 0;
    }

    #pfeil {
        display: inline-block;
        height: 1.3em;
        width: 1.3em;
        margin-left: 8px;
        object-fit: contain;
        filter: brightness(0) saturate(100%) invert(27%) sepia(96%) saturate(7445%) hue-rotate(307deg);
        flex-shrink: 0;
        opacity: 0;
        will-change: opacity;
        transition: opacity 0.35s ease;
    }

    #LangView {
        display: none;
        position: fixed;
        top: 64px; bottom: 64px;
        left: 20px;
        right: 20px;
        flex-direction: column;
        justify-content: center;
        overflow-y: auto;
        z-index: 5;
        background: white;
    }
    #LangView.aktiv { display: flex; }

    .LangPill {
        border-bottom: var(--linie);
        padding: var(--pad);
        font-size: var(--fs);
        color: #ff009d;
        text-align: center;
        cursor: pointer;
        opacity: 0;
        background: white;
        flex-shrink: 0;
    }

    #InfoView {
        display: none;
        position: fixed;
        top: 64px; bottom: 64px;
        left: 20px;
        right: 20px;
        flex-direction: column;
        justify-content: center;
        overflow-x: hidden;
        overflow-y: auto;
        z-index: 5;
        background: white;
    }
    #InfoView.aktiv { display: flex; }

    #info-row {
        border-top: var(--linie);
        border-bottom: var(--linie);
        padding: 1px 0;
        font-size: var(--fs);
        display: flex;
        align-items: center;
        user-select: none;
        cursor: pointer;
    }

    #info-prev, #info-next {
        display: block;
        flex-shrink: 0;
        height: 1.3em;
        width: 1.3em;
        object-fit: contain;
        filter: brightness(0) saturate(100%) invert(27%) sepia(96%) saturate(7445%) hue-rotate(307deg);
    }
    #info-prev { transform: rotate(180deg); margin-left: -12px; }
    #info-next { margin-right: -12px; }
    #InfoView[dir="rtl"] #info-prev { transform: rotate(0deg); margin-left: 0; margin-right: -12px; }
    #InfoView[dir="rtl"] #info-next { transform: rotate(180deg); margin-right: 0; margin-left: -12px; }

    #InfoText {
        flex: 1;
        min-width: 0;
        padding: 0 14px;
        font-size: var(--fs);
        color: #ff009d;
        text-align: center;
        line-height: 1.15;
        hyphens: auto;
        overflow-wrap: break-word;
    }

    .LangPill:first-child { border-top: var(--linie); }

    #InfoText a, #Frage1 a {
        color: #ff009d;
        text-decoration: none;
        display: inline-block;
    }

    a.wackeln { animation: wackeln 0.5s ease; }
    #InfoText a:hover, #Frage1 a:hover { animation: wackeln 0.4s ease; }
    .qmark { display: inline-block; transform: scaleX(-1); }

@media (max-width: 430px) { :root { --fs: 38px; } }

    let aktiveSprache = "de";
    let aktiveFrageIndex = 0;
    let aktiveInfoIndex = 0;
    let langViewOffen = false;
    let infoViewOffen = false;

    function animiereFrageText(el, html) {
        var STEP = 0.07;
        var d = 0;
        var re = /(<br\s*\/?>)|(<a\b[^>]*?>[\s\S]*?<\/a>)|(<span\b[^>]*?>[\s\S]*?<\/span>)|([^\s<]+)/g;
        var parts = [];
        var hadSpace = [];
        var prevEnd = 0;
        var m;
        while ((m = re.exec(html)) !== null) {
            hadSpace.push(m.index > prevEnd);
            prevEnd = m.index + m[0].length;
            if (/^<br/i.test(m[0])) {
                parts.push('<br>');
            } else {
                parts.push('<span style="opacity:0;animation:einblenden 0.3s ease forwards ' + d + 's">' + m[0] + '</span>');
                d += STEP;
            }
        }
        var out = '';
        for (var i = 0; i < parts.length; i++) {
            if (i > 0 && hadSpace[i] && parts[i] !== '<br>') out += ' ';
            out += parts[i];
        }
        el.innerHTML = out;
        el._animVer = (el._animVer || 0) + 1;
        var ver = el._animVer;
        setTimeout(function() {
            if (el._animVer === ver) el.innerHTML = html;
        }, Math.round((d + 0.3) * 1000) + 200);
    }

    function zeigeFrageAktuell() {
        const t = uebersetzungen[aktiveSprache];
        animiereFrageText(document.getElementById("Frage1"), t.fragen[aktiveFrageIndex]);
        document.getElementById("frage-nav-label").textContent = t.andereFrage;
    }

    function versteckeAlles() {
        document.getElementById("container").style.display = "none";
        document.getElementById("LangView").classList.remove("aktiv");
        document.getElementById("InfoView").classList.remove("aktiv");
    }

    function zeigeHauptansicht() {
        const t = uebersetzungen[aktiveSprache];
        document.getElementById("container").style.display = "flex";
        document.getElementById("LangView").classList.remove("aktiv");
        document.getElementById("InfoView").classList.remove("aktiv");
        document.getElementById("LangButton").textContent = "Languages";
        document.getElementById("InfoButton").textContent = t.infobtn;
        langViewOffen = false;
        infoViewOffen = false;
    }

    function spracheWechseln(lang) {
        aktiveSprache = lang;
        const t = uebersetzungen[lang];
        document.getElementById("Eingabe").placeholder = t.placeholder;
        document.getElementById("SubmitText").textContent = t.absenden;
        document.getElementById("container").style.direction = t.dir;
        document.getElementById("container").setAttribute("dir", t.dir);
        zeigeFrageAktuell();
        zeigeHauptansicht();
    }

    function zeigeInfoAktuell() {
        const t = uebersetzungen[aktiveSprache];
        const el = document.getElementById("InfoText");
        el.setAttribute("lang", t.lang);
        animiereFrageText(el, t.info[aktiveInfoIndex]);
    }

    function langViewOeffnen() {
        langViewOffen = true;
        infoViewOffen = false;
        versteckeAlles();
        document.getElementById("LangButton").textContent = "Back";
        document.getElementById("InfoButton").textContent = uebersetzungen[aktiveSprache].infobtn;
        const view = document.getElementById("LangView");
        view.classList.add("aktiv");
        view.querySelectorAll(".LangPill").forEach(function(pill, i) {
            pill.style.opacity = "0";
            pill.style.animation = "none";
            setTimeout(function() { pill.style.animation = "langEinblenden 0.4s ease forwards"; }, i * 120);
        });
    }

    function infoViewOeffnen() {
        infoViewOffen = true;
        langViewOffen = false;
        versteckeAlles();
        document.getElementById("InfoButton").textContent = uebersetzungen[aktiveSprache].zurueck;
        document.getElementById("LangButton").textContent = "Languages";
        aktiveInfoIndex = 0;
        const dir = uebersetzungen[aktiveSprache].dir;
        document.getElementById("InfoView").style.direction = dir;
        document.getElementById("InfoView").setAttribute("dir", dir);
        document.getElementById("InfoView").classList.add("aktiv");
        zeigeInfoAktuell();
    }

    document.getElementById("InfoButton").onclick = function() {
        if (infoViewOffen) { zeigeHauptansicht(); } else { infoViewOeffnen(); }
    };

    document.getElementById("LangButton").onclick = function() {
        if (langViewOffen) { zeigeHauptansicht(); } else { langViewOeffnen(); }
    };

    document.querySelectorAll(".LangPill").forEach(function(pill) {
        pill.onclick = function() { spracheWechseln(this.dataset.lang); };
    });

    document.getElementById("info-prev").onclick = function() {
        const t = uebersetzungen[aktiveSprache];
        aktiveInfoIndex = (aktiveInfoIndex - 1 + t.info.length) % t.info.length;
        zeigeInfoAktuell();
    };

    document.getElementById("info-next").onclick = function() {
        const t = uebersetzungen[aktiveSprache];
        aktiveInfoIndex = (aktiveInfoIndex + 1) % t.info.length;

    };

    document.getElementById("frage-next").onclick = function() {
        const t = uebersetzungen[aktiveSprache];
        aktiveFrageIndex = (aktiveFrageIndex + 1) % t.fragen.length;
        zeigeFrageAktuell();
    };

    document.getElementById("Submit").onclick = function() {
        const text = document.getElementById("Eingabe").value.trim();
        const t = uebersetzungen[aktiveSprache];
        const submitText = document.getElementById("SubmitText");
        if (text === "") {
            animiereFrageText(submitText, t.leer);
            setTimeout(function() {
                submitText.textContent = t.absenden;
            }, 3000);
            return;
        }
        document.getElementById("Eingabe").value = "";
        showCursorBar();
        pfeilEl.style.transition = "none";
        pfeilEl.style.opacity = "0";
        submitText.textContent = t.danke;
        setTimeout(function() { submitText.textContent = t.absenden; }, 3000);
        fetch("/absenden", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: text, frage: aktiveFrageIndex })
        });
    };

    var barEl = document.getElementById("cursor-bar");
    var pfeilEl = document.getElementById("pfeil");

    function showCursorBar() {
        barEl.style.opacity = "";
        barEl.style.animation = "cursor-puls 2.2s ease-in-out infinite";
    }
    function hideCursorBar() {
        barEl.style.animation = "none";
        barEl.style.opacity = "0";
    }

    document.getElementById("Eingabe").addEventListener("keydown", function(e) {
        const ta = this;
        const pos = ta.selectionStart;
        const lines = ta.value.split('\n');

        let lineStart = 0;
        let lineIndex = 0;
        for (let i = 0; i < lines.length; i++) {
            if (pos <= lineStart + lines[i].length) { lineIndex = i; break; }
            lineStart += lines[i].length + 1;
        }
        const posInLine = pos - lineStart;

        if (e.key === 'Enter') return;

        if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && posInLine >= 20) {
            e.preventDefault();
            const before = ta.value.slice(0, pos);
            const after = ta.value.slice(ta.selectionEnd);
            ta.value = before + '\n' + e.key + after;
            ta.selectionStart = ta.selectionEnd = pos + 2;
            ta.dispatchEvent(new Event('input'));
        }
    });

    document.getElementById("Eingabe").addEventListener("input", function() {
        if (this.value) {
            hideCursorBar();
            pfeilEl.style.transition = "";
            pfeilEl.style.opacity = "1";
        } else {
            showCursorBar();
            pfeilEl.style.opacity = "0";
        }
    });

    document.getElementById("Eingabe").addEventListener("focus", function() {
        if (!this.value) {
            barEl.style.opacity = "";
            barEl.style.animation = "none";
            barEl.style.height = "120px";
            requestAnimationFrame(function() {
                requestAnimationFrame(function() {
                    barEl.style.animation = "cursor-puls 1.1s ease-in-out infinite";
                });
            });
        }
    });

    document.getElementById("Eingabe").addEventListener("blur", function() {
        barEl.style.height = "90px";
        if (!this.value) {
            barEl.style.animation = "none";
            requestAnimationFrame(function() {
                requestAnimationFrame(function() {
                    barEl.style.animation = "cursor-puls 2.2s ease-in-out infinite";
                });
            });
        }
    });

    setInterval(function() {
        document.querySelectorAll("a").forEach(function(a) {
            if (a.textContent.trim().includes("Plus")) {
                a.classList.add("wackeln");
                setTimeout(function() { a.classList.remove("wackeln"); }, 500);
            }
        });
    }, 10000);

    spracheWechseln("de");


</script>
</html>
