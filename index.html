<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klybeck</title>
</head>
<body>

    <div id="frame">

    <div id="InfoButton">INFO</div>

    <div id="container">
        <div id="Frage1">WAS WÜNSCHST DU<br>DIR IM NEUEN KLYBECK?</div>
        <textarea id="Eingabe" placeholder="..."></textarea>
        <div id="Submit">ABSENDEN</div>
    </div>

    <div id="LangButton">LANGUAGES</div>
    <div id="LangMenu">
        <div class="LangOption" data-lang="de">DEUTSCH</div>
        <div class="LangOption" data-lang="it">ITALIANO</div>
        <div class="LangOption" data-lang="fr">FRANÇAIS</div>
        <div class="LangOption" data-lang="ar">عربي</div>
        <div class="LangOption" data-lang="tr">TÜRKÇE</div>
        <div class="LangOption" data-lang="en">ENGLISH</div>
        <div class="LangOption" data-lang="es">ESPAÑOL</div>
        <div class="LangOption" data-lang="sr">SRPSKI</div>
    </div>

    </div> <!-- end frame -->

</body>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        background-color: rgb(255, 0, 149);
        height: 100dvh;
        overflow: hidden;
        font-family: Helvetica, Arial, sans-serif;
        padding: 20px;
    }

    #frame {
        background: white;
        border-radius: 30px;
        height: 100%;
        overflow: hidden;
        position: relative;
    }

    #InfoButton {
        position: fixed;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #e0e0e0;
        border-radius: 50px;
        padding: 3px 10px;
        font-size: 38px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
    }

    #container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 85%;
        max-width: 520px;
    }

    #Frage1 {
        background: #e0e0e0;
        border-radius: 50px;
        padding: 3px 10px;
        font-size: 38px;
        font-weight: 500;
        color: black;
        text-align: center;
        line-height: 1;
        width: 100%;
    }

    #Eingabe {
        background: #e0e0e0;
        border-radius: 50px;
        border: none;
        outline: none;
        padding: 3px 10px;
        font-size: 38px;
        font-weight: 500;
        font-family: Helvetica, Arial, sans-serif;
        color: black;
        width: 65%;
        resize: none;
        height: 80px;
    }

    #Submit {
        background: #e0e0e0;
        border-radius: 50px;
        padding: 3px 10px;
        font-size: 38px;
        font-weight: 500;
        cursor: pointer;
        color: black;
    }

    #LangButton {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #e0e0e0;
        border-radius: 50px;
        padding: 3px 10px;
        font-size: 38px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
    }

    #LangMenu {
        display: none;
        position: fixed;
        bottom: 85px;
        left: 50%;
        transform: translateX(-50%);
        background: #e0e0e0;
        border-radius: 20px;
        overflow: hidden;
        white-space: nowrap;
    }

    .LangOption {
        font-size: 38px;
        font-weight: 500;
        color: black;
        padding: 3px 10px;
        cursor: pointer;
        text-align: center;
    }

    .LangOption:hover {
        background-color: #b0b0b0;
    }

    #Eingabe::placeholder {
        color: black;
        font-size: 40px;
        text-align: center;
    }

    @media (max-width: 430px) {
        #InfoButton, #Frage1, #Eingabe, #Submit, #LangButton, .LangOption {
            font-size: 28px;
        }
        #Eingabe::placeholder {
            font-size: 28px;
        }
    }
</style>
<script>

    const uebersetzungen = {
        de: {
            frage: "WAS WÜNSCHST DU<br>DIR IM NEUEN KLYBECK?",
            placeholder: "...",
            absenden: "ABSENDEN",
            danke: "DANKE FÜR DEINE EINSENDUNG!",
            leer: "BITTE ETWAS EINFÜGEN.",
            dir: "ltr"
        },
        it: {
            frage: "COSA DESIDERI<br>NEL NUOVO KLYBECK?",
            placeholder: "...",
            absenden: "INVIA",
            danke: "GRAZIE PER IL TUO CONTRIBUTO!",
            leer: "PER FAVORE SCRIVI QUALCOSA.",
            dir: "ltr"
        },
        fr: {
            frage: "QUE SOUHAITES-TU<br>DANS LE NOUVEAU KLYBECK?",
            placeholder: "...",
            absenden: "ENVOYER",
            danke: "MERCI POUR TA RÉPONSE!",
            leer: "VEUILLEZ ÉCRIRE QUELQUE CHOSE.",
            dir: "ltr"
        },
        ar: {
            frage: "ماذا تتمنى<br>في KLYBECK الجديد؟",
            placeholder: "...",
            absenden: "إرسال",
            danke: "شكراً على مشاركتك!",
            leer: "يرجى كتابة شيء ما.",
            dir: "rtl"
        },
        tr: {
            frage: "YENİ KLYBECK'TE<br>NE İSTERSİN?",
            placeholder: "...",
            absenden: "GÖNDER",
            danke: "KATKIN İÇİN TEŞEKKÜRLER!",
            leer: "LÜTFEN BİR ŞEYLER YAZ.",
            dir: "ltr"
        },
        en: {
            frage: "WHAT DO YOU WISH FOR<br>IN THE NEW KLYBECK?",
            placeholder: "...",
            absenden: "SUBMIT",
            danke: "THANK YOU FOR YOUR SUBMISSION!",
            leer: "PLEASE ENTER SOMETHING.",
            dir: "ltr"
        },
        es: {
            frage: "¿QUÉ DESEAS<br>EN EL NUEVO KLYBECK?",
            placeholder: "...",
            absenden: "ENVIAR",
            danke: "¡GRACIAS POR TU APORTACIÓN!",
            leer: "POR FAVOR ESCRIBE ALGO.",
            dir: "ltr"
        },
        sr: {
            frage: "ŠTA ŽELIŠ<br>U NOVOM KLYBECKU?",
            placeholder: "...",
            absenden: "POŠALJI",
            danke: "HVALA NA TVOM DOPRINOSU!",
            leer: "MOLIMO UNESITE NEŠTO.",
            dir: "ltr"
        }
    };

    let aktiveSprache = "de";

    function spracheWechseln(lang) {
        aktiveSprache = lang;
        const t = uebersetzungen[lang];
        document.getElementById("Frage1").innerHTML = t.frage;
        document.getElementById("Eingabe").placeholder = t.placeholder;
        document.getElementById("Submit").textContent = t.absenden;
        document.getElementById("container").style.direction = t.dir;
        document.getElementById("LangMenu").style.display = "none";
    }

    document.getElementById("LangButton").onclick = function() {
        const menu = document.getElementById("LangMenu");
        menu.style.display = menu.style.display === "block" ? "none" : "block";
    };

    document.querySelectorAll(".LangOption").forEach(function(option) {
        option.onclick = function() {
            spracheWechseln(this.dataset.lang);
        };
    });

    document.getElementById("Submit").onclick = function() {
        const text = document.getElementById("Eingabe").value.trim();
        const btn = document.getElementById("Submit");
        const t = uebersetzungen[aktiveSprache];

        if (text === "") {
            btn.textContent = t.leer;
            setTimeout(function() { btn.textContent = t.absenden; }, 3000);
            return;
        }

        document.getElementById("Eingabe").value = "";
        btn.textContent = t.danke;
        setTimeout(function() { btn.textContent = t.absenden; }, 3000);

        fetch("/absenden", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: text })
        });
    };

</script>
</html>
