<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Klybeck</title>
</head>
<body>

    <div id="frame">

        <div id="InfoButton">Info</div>

        <div id="container">
            <div id="content">
                <div id="frage-nav">
                    <span id="frage-prev"></span>
                    <span id="frage-nav-label">Andere Frage</span>
                    <span id="frage-next"></span>
                </div>
                <div id="Frage1"></div>
                <div id="eingabe-wrapper">
                    <textarea id="Eingabe" placeholder=""></textarea>
                    <div id="cursor-bar"></div>
                </div>
                <div id="Submit"><span id="pfeil-phantom"></span><span id="SubmitText">Absenden</span><span id="pfeil"></span></div>
            </div>
        </div>

        <div id="InfoView">
            <div class="InfoPill" id="InfoPill1" lang="de"></div>
            <div class="InfoPill" id="InfoPill2" lang="de"></div>
            <div class="InfoPill" id="InfoPill3" lang="de"></div>
        </div>

        <div id="LangView">
            <div class="LangPill" data-lang="de">Deutsch</div>
            <div class="LangPill" data-lang="it">Italiano</div>
            <div class="LangPill" data-lang="fr">Français</div>

            <div class="LangPill" data-lang="tr">Türkçe</div>

            <div class="LangPill" data-lang="es">Español</div>
            <div class="LangPill" data-lang="sr">Srpski</div>
        </div>

        <div id="LangButton">Languages</div>

    </div>

<style>
    :root {
        --linie: 8px solid #ff009d;
        --fs: 46px;
        --pad: 1px 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: white;
        height: 100dvh;
        overflow: hidden;
        font-family: Helvetica, Arial, sans-serif;
    }

    #frame { height: 100%; overflow: hidden; position: relative; }

    @keyframes einblenden { from { opacity: 0; } to { opacity: 1; } }
    @keyframes langEinblenden { from { opacity: 0; } to { opacity: 1; } }
    @keyframes cursor-puls { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes wackeln {
        0%   { transform: rotate(0deg); }
        15%  { transform: rotate(-8deg); }
        35%  { transform: rotate(8deg); }
        55%  { transform: rotate(-5deg); }
        75%  { transform: rotate(5deg); }
        100% { transform: rotate(0deg); }
    }

    #InfoButton {
        position: fixed;
        top: max(0px, env(safe-area-inset-top));
        left: 50%;
        transform: translateX(-50%);
        max-width: 92vw;
        border-bottom: var(--linie);
        text-align: center;
        padding: var(--pad);
        font-size: var(--fs);
        color: #ff009d;
        background: white;
        cursor: pointer;
        opacity: 0;
        z-index: 10;
    }

    #LangButton {
        position: fixed;
        bottom: max(0px, env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        max-width: 92vw;
        border-top: var(--linie);
        text-align: center;
        padding: var(--pad);
        font-size: var(--fs);
        color: #ff009d;
        background: white;
        cursor: pointer;
        opacity: 0;
        z-index: 10;
    }

    #container {
        position: absolute;
        top: 0; bottom: 0; left: 0; right: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    #content {
        display: flex;
        flex-direction: column;
        max-width: 92vw;
    }

    #frage-nav {
        border-top: var(--linie);
        border-bottom: var(--linie);
        padding: var(--pad);
        font-size: var(--fs);
        color: #ff009d;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        opacity: 0;
        user-select: none;
    }

    #frage-prev, #frage-next {
        display: inline-block;
        height: 1.3em;
        width: 1.3em;
        background-color: #ff009d;
        -webkit-mask: url('weiter.png') no-repeat center / contain;
        mask: url('weiter.png') no-repeat center / contain;
        flex-shrink: 0;
    }
    #frage-prev { transform: rotate(180deg); }

    #Frage1 {
        border-bottom: var(--linie);
        padding: 3px 14px;
        font-size: var(--fs);
        color: #ff009d;
        text-align: center;
        line-height: 1;
        opacity: 0;
    }

    #eingabe-wrapper {
        position: relative;
        border-bottom: var(--linie);
        overflow: hidden;
        opacity: 0;
    }

    #Eingabe {
        background: transparent;
        border: none;
        outline: none;
        padding: 37px 14px;
        font-size: var(--fs);
        font-family: Helvetica, Arial, sans-serif;
        line-height: 1;
        color: #ff009d;
        caret-color: transparent;
        width: 100%;
        resize: none;
        overflow: hidden;
        height: 120px;
        text-align: center;
        display: block;
    }

    #cursor-bar {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 10px;
        height: 100px;
        background: #ff009d;
        border-radius: 20px;
        display: block;
        animation: cursor-puls 1.4s ease-in-out infinite;
        pointer-events: none;
        z-index: 1;
    }

    #Submit {
        display: flex;
        justify-content: center;
        align-items: center;
        border-bottom: var(--linie);
        padding: var(--pad);
        font-size: var(--fs);
        color: #ff009d;
        text-align: center;
        cursor: pointer;
        opacity: 0;
    }

    #pfeil-phantom {
        display: inline-block;
        height: 1.0em;
        width: 1.0em;
        margin-right: 8px;
        flex-shrink: 0;
    }

    #pfeil {
        display: inline-block;
        height: 1.3em;
        width: 1.3em;
        margin-left: 8px;
        background-color: #ff009d;
        -webkit-mask: url('pfeil.png') no-repeat center / contain;
        mask: url('pfeil.png') no-repeat center / contain;
        flex-shrink: 0;
        opacity: 0;
        transition: opacity 0.35s ease;
    }

    #LangView {
        display: none;
        position: fixed;
        top: 64px; bottom: 64px;
        left: 50%;
        transform: translateX(-50%);
        max-width: 92vw;
        flex-direction: column;
        justify-content: center;
        overflow-y: auto;
        z-index: 5;
        background: white;
    }
    #LangView.aktiv { display: flex; }

    .LangPill {
        border-bottom: var(--linie);
        padding: var(--pad);
        font-size: var(--fs);
        color: #ff009d;
        text-align: center;
        cursor: pointer;
        opacity: 0;
        background: white;
        flex-shrink: 0;
    }

    #InfoView {
        display: none;
        position: fixed;
        top: 64px; bottom: 64px;
        left: 50%;
        transform: translateX(-50%);
        max-width: 92vw;
        flex-direction: column;
        justify-content: center;
        overflow-y: auto;
        z-index: 5;
        background: white;
    }
    #InfoView.aktiv { display: flex; }

    .InfoPill {
        border-bottom: var(--linie);
        padding: var(--pad);
        font-size: var(--fs);
        color: #ff009d;
        text-align: center;
        opacity: 0;
        background: white;
        line-height: 1.15;
        hyphens: auto;
        flex-shrink: 0;
    }

    .InfoPill:first-child, .LangPill:first-child { border-top: var(--linie); }

    .InfoPill a, #Frage1 a {
        color: #ff009d;
        text-decoration: none;
        display: inline-block;
    }

    a.wackeln { animation: wackeln 0.5s ease; }
    .InfoPill a:hover, #Frage1 a:hover { animation: wackeln 0.4s ease; }

    @media (max-width: 430px) { :root { --fs: 38px; } }
</style>

            ]

    let aktiveSprache = "de";
    let aktiveFrageIndex = 0;
    let langViewOffen = false;
    let infoViewOffen = false;

    function zeigeFrageAktuell() {
        const t = uebersetzungen[aktiveSprache];
        document.getElementById("Frage1").innerHTML = t.fragen[aktiveFrageIndex];
        document.getElementById("frage-nav-label").textContent = t.andereFrage;
    }

    function versteckeAlles() {
        document.getElementById("container").style.display = "none";
        document.getElementById("LangView").classList.remove("aktiv");
        document.getElementById("InfoView").classList.remove("aktiv");
    }

    let cachedWidth = 0;

    function syncButtons() {
        const content = document.getElementById("content");
        const rect = content.getBoundingClientRect();
        if (rect.width > 0) { cachedWidth = rect.width; }
        if (cachedWidth === 0) return;
        ["InfoButton", "LangButton", "LangView", "InfoView"].forEach(function(id) {
            document.getElementById(id).style.width = cachedWidth + "px";
        });
    }

    function zeigeHauptansicht() {
        const t = uebersetzungen[aktiveSprache];
        document.getElementById("container").style.display = "flex";
        document.getElementById("LangView").classList.remove("aktiv");
        document.getElementById("InfoView").classList.remove("aktiv");
        document.getElementById("LangButton").textContent = "Languages";
        document.getElementById("InfoButton").textContent = t.infobtn;
        langViewOffen = false;
        infoViewOffen = false;
        requestAnimationFrame(syncButtons);
    }

    function spracheWechseln(lang) {
        aktiveSprache = lang;
        const t = uebersetzungen[lang];
        document.getElementById("Eingabe").placeholder = t.placeholder;
        document.getElementById("SubmitText").textContent = t.absenden;
        document.getElementById("container").style.direction = t.dir;
        document.querySelectorAll(".InfoPill").forEach(function(pill, i) {
            pill.innerHTML = t.info[i];
            pill.setAttribute("lang", t.lang);
        });
        zeigeFrageAktuell();
        zeigeHauptansicht();
    }

    function langViewOeffnen() {
        syncButtons();
        langViewOffen = true;
        infoViewOffen = false;
        versteckeAlles();
        document.getElementById("LangButton").textContent = "Back";
        document.getElementById("InfoButton").textContent = uebersetzungen[aktiveSprache].infobtn;
        const view = document.getElementById("LangView");
        view.classList.add("aktiv");
        view.querySelectorAll(".LangPill").forEach(function(pill, i) {
            pill.style.opacity = "0";
            pill.style.animation = "none";
            setTimeout(function() { pill.style.animation = "langEinblenden 0.4s ease forwards"; }, i * 120);
        });
    }

    function infoViewOeffnen() {
        syncButtons();
        infoViewOffen = true;
        langViewOffen = false;
        versteckeAlles();
        document.getElementById("InfoButton").textContent = uebersetzungen[aktiveSprache].zurueck;
        document.getElementById("LangButton").textContent = "Languages";
        const view = document.getElementById("InfoView");
        view.classList.add("aktiv");
        view.querySelectorAll(".InfoPill").forEach(function(pill, i) {
            pill.style.opacity = "0";
            pill.style.animation = "none";
            setTimeout(function() { pill.style.animation = "langEinblenden 0.4s ease forwards"; }, i * 150);
        });
    }

    document.getElementById("InfoButton").onclick = function() {
        if (infoViewOffen) { zeigeHauptansicht(); } else { infoViewOeffnen(); }
    };

    document.getElementById("LangButton").onclick = function() {
        if (langViewOffen) { zeigeHauptansicht(); } else { langViewOeffnen(); }
    };

    document.querySelectorAll(".LangPill").forEach(function(pill) {
        pill.onclick = function() { spracheWechseln(this.dataset.lang); };
    });

    document.getElementById("frage-prev").onclick = function() {
        const t = uebersetzungen[aktiveSprache];
        aktiveFrageIndex = (aktiveFrageIndex - 1 + t.fragen.length) % t.fragen.length;
        zeigeFrageAktuell();
    };

    document.getElementById("frage-next").onclick = function() {
        const t = uebersetzungen[aktiveSprache];
        aktiveFrageIndex = (aktiveFrageIndex + 1) % t.fragen.length;
        zeigeFrageAktuell();
    };

    document.getElementById("Submit").onclick = function() {
        const text = document.getElementById("Eingabe").value.trim();
        const t = uebersetzungen[aktiveSprache];
        const submitText = document.getElementById("SubmitText");
        if (text === "") {
            const pfeil = document.getElementById("pfeil");
            submitText.textContent = t.leer;
            pfeil.style.display = "none";
            setTimeout(function() {
                submitText.textContent = t.absenden;
                pfeil.style.display = "";
            }, 3000);
            return;
        }
        document.getElementById("Eingabe").value = "";
        document.getElementById("cursor-bar").style.display = "block";
        const p = document.getElementById("pfeil");
        p.style.opacity = "0";
        submitText.textContent = t.danke;
        setTimeout(function() { submitText.textContent = t.absenden; }, 3000);
        fetch("/absenden", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: text, frage: aktiveFrageIndex })
        });
    };

    document.getElementById("Eingabe").addEventListener("input", function() {
        document.getElementById("cursor-bar").style.display = this.value ? "none" : "block";
        var p = document.getElementById("pfeil");
        if (this.value) {
            p.style.opacity = "1";
        } else {
            p.style.opacity = "0";
        }
    });

    document.getElementById("Eingabe").addEventListener("focus", function() {
        if (!this.value) {
            const bar = document.getElementById("cursor-bar");
            bar.style.animation = "none";
            bar.offsetHeight;
            bar.style.animation = "cursor-puls 1.4s ease-in-out infinite";
        }
    });

    setInterval(function() {
        document.querySelectorAll("a").forEach(function(a) {
            a.classList.add("wackeln");
            setTimeout(function() { a.classList.remove("wackeln"); }, 500);
        });
    }, 10000);

    function pageLoadAnimation() {
        const t = uebersetzungen[aktiveSprache];
        const STEP = 0.1;
        const GAP = 0.08;
        let d = 0.1;

        // Wrap HTML in per-word spans, each with its own delay
        function wordSpans(html) {
            const re = /(<br\s*\/?>)|(<a\b[^>]*?>[\s\S]*?<\/a>)|(\S+)/g;
            const parts = [];
            let m;
            while ((m = re.exec(html)) !== null) {
                if (/^<br/i.test(m[0])) {
                    parts.push('<br>');
                } else {
                    parts.push('<span style="opacity:0;animation:einblenden 0.3s ease forwards ' + d + 's">' + m[0] + '</span>');
                    d += STEP;
                }
            }
            let out = '';
            for (let i = 0; i < parts.length; i++) {
                if (i > 0 && parts[i] !== '<br>' && parts[i - 1] !== '<br>') out += ' ';
                out += parts[i];
            }
            return out;
        }

        // Make element visible instantly at time d (border hidden by matching background)
        function startRow(el) {
            el.style.borderColor = 'white';
            el.style.animation = 'einblenden 0.001s ease forwards ' + d + 's';
        }

        // Reveal border after the last word's animation FINISHES (start + 0.3s duration)
        function endRow(el) {
            var borderDelay = d - STEP + 0.3; // last word started at d-STEP, takes 0.3s
            setTimeout(function() { el.style.borderColor = '#ff009d'; }, borderDelay * 1000);
            d = borderDelay + GAP; // next row starts after border appears
        }

        // Info button
        var infoBtn = document.getElementById('InfoButton');
        startRow(infoBtn);
        infoBtn.innerHTML = '<span style="opacity:0;animation:einblenden 0.3s ease forwards ' + d + 's">' + infoBtn.textContent + '</span>';
        d += STEP;
        endRow(infoBtn);

        // frage-nav
        var nav = document.getElementById('frage-nav');
        startRow(nav);
        var prevEl = document.getElementById('frage-prev');
        prevEl.style.opacity = '0';
        prevEl.style.animation = 'einblenden 0.3s ease forwards ' + d + 's';
        d += STEP;
        document.getElementById('frage-nav-label').innerHTML = t.andereFrage.split(/\s+/).map(function(w) {
            var s = '<span style="opacity:0;animation:einblenden 0.3s ease forwards ' + d + 's">' + w + '</span>';
            d += STEP; return s;
        }).join(' ');
        var nextEl = document.getElementById('frage-next');
        nextEl.style.opacity = '0';
        nextEl.style.animation = 'einblenden 0.3s ease forwards ' + d + 's';
        d += STEP;
        endRow(nav);

        // Frage1
        var f1 = document.getElementById('Frage1');
        startRow(f1);
        f1.innerHTML = wordSpans(t.fragen[aktiveFrageIndex]);
        endRow(f1);

        // eingabe-wrapper — no words, fade in whole
        document.getElementById('eingabe-wrapper').style.animation = 'einblenden 0.3s ease forwards ' + d + 's';
        d += 0.3 + GAP;

        // Submit
        var sub = document.getElementById('Submit');
        startRow(sub);
        document.getElementById('SubmitText').innerHTML = t.absenden.split(/\s+/).map(function(w) {
            var s = '<span style="opacity:0;animation:einblenden 0.3s ease forwards ' + d + 's">' + w + '</span>';
            d += STEP; return s;
        }).join(' ');
        endRow(sub);

        // LangButton
        var langBtn = document.getElementById('LangButton');
        startRow(langBtn);
        langBtn.innerHTML = '<span style="opacity:0;animation:einblenden 0.3s ease forwards ' + d + 's">' + langBtn.textContent + '</span>';
        d += STEP;
        endRow(langBtn);
    }

    spracheWechseln("de");
    pageLoadAnimation();

    document.fonts.ready.then(function() {
        syncButtons();
        window.addEventListener("resize", syncButtons);
    });

</script>
</html>
