    html { height: 100%; }

    body {

        15%  { transform: rotate(-3deg); }

        75%  { transform: rotate(2deg); }
        100% { transform: rotate(0deg); }

        padding: var(--pad);
        font-size: var(--fs);
        color: white;
        background: transparent;
        cursor: pointer;
        z-index: 10;
        filter: brightness(0) saturate(100%) invert(23%) sepia(96%) saturate(6000%) hue-rotate(319deg) brightness(104%);

    #LangButton {
        position: fixed;

        left: 20px;
        right: 20px;
        border-top: var(--linie);

        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;

    #content {
        display: flex;
        flex-direction: column;
        width: calc(100% - 40px);
        filter: brightness(0) saturate(100%) invert(23%) sepia(96%) saturate(6000%) hue-rotate(319deg) brightness(104%);
    }

    #frage-nav {
        border-top: var(--linie);
        border-bottom: var(--linie);
        padding: 1px 0;
        font-size: var(--fs);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 1.96em;
        cursor: pointer;
        user-select: none;
    }

    #frage-prev, #frage-next {
        display: block;
        height: 1.3em;
        width: 1.3em;
        object-fit: contain;
        flex-shrink: 0;

        color: white;
        text-align: center;
        line-height: 1;

    #eingabe-wrapper {
        position: relative;
        border-top: var(--linie);
        border-bottom: var(--linie);
        overflow: hidden;
    }

    #Eingabe {
        background: transparent;
        border: none;
        outline: none;
        padding: 49px 14px 3px;
        font-size: var(--fs);
        font-family: Helvetica, Arial, sans-serif;

        overflow: hidden;
        height: 144px;
        text-align: center;
        display: block;
    }

    #cursor-bar {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 10px;
        height: 90px;
        background: white;
        border-radius: 20px;
        animation: cursor-puls 2.2s ease-in-out infinite;
        pointer-events: none;
        z-index: 1;
        transition: height 0.2s ease;
        will-change: opacity;

    function addPfeilNachLinks(el) {
        el.querySelectorAll('a[href*="klybeckplus"], a[href*="olivierwick"], a[href*="zukunftklybeck"]').forEach(function(a) {

                a.appendChild(img);

    function animiereFrageText(el, html) {
        var STEP = 0.07;
        var d = 0;
        var re = /(<br\s*\/?>)|(<a\b[^>]*?>[\s\S]*?<\/a>)|(<span\b[^>]*?>[\s\S]*?<\/span>)|([^\s<]+)/g;
        var parts = [];
        var hadSpace = [];
        var prevEnd = 0;
        var m;
        while ((m = re.exec(html)) !== null) {
            hadSpace.push(m.index > prevEnd);
            prevEnd = m.index + m[0].length;
            if (/^<br/i.test(m[0])) {
                parts.push('<br>');
            } else {
                parts.push('<span style="opacity:0;animation:einblenden 0.3s ease forwards ' + d + 's">' + m[0] + '</span>');
                d += STEP;
            }
        }
        var out = '';
        for (var i = 0; i < parts.length; i++) {
            if (i > 0 && hadSpace[i] && parts[i] !== '<br>') out += ' ';
            out += parts[i];
        }
        el.innerHTML = out;
        addPfeilNachLinks(el);
        el._animVer = (el._animVer || 0) + 1;
        var ver = el._animVer;
        setTimeout(function() {
            if (el._animVer === ver) { el.innerHTML = html; addPfeilNachLinks(el); }
        }, Math.round((d + 0.3) * 1000) + 200);
    }

    var barEl = document.getElementById("cursor-bar");

    function showCursorBar() {
        barEl.style.opacity = "";
        barEl.style.animation = "cursor-puls 2.2s ease-in-out infinite";
    }
    function hideCursorBar() {
        barEl.style.animation = "none";
        barEl.style.opacity = "0";
    }

    document.getElementById("Eingabe").addEventListener("keydown", function(e) {
        const ta = this;
        const pos = ta.selectionStart;
        const lines = ta.value.split('\n');

        let lineStart = 0;
        let lineIndex = 0;
        for (let i = 0; i < lines.length; i++) {
            if (pos <= lineStart + lines[i].length) { lineIndex = i; break; }
            lineStart += lines[i].length + 1;
        }
        const posInLine = pos - lineStart;

        if (e.key === 'Enter') return;

        if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && posInLine >= 20) {
            e.preventDefault();
            const before = ta.value.slice(0, pos);
            const after = ta.value.slice(ta.selectionEnd);
            ta.value = before + '\n' + e.key + after;
            ta.selectionStart = ta.selectionEnd = pos + 2;
            ta.dispatchEvent(new Event('input'));
        }
    });

    document.getElementById("Eingabe").addEventListener("input", function() {
        if (this.value) {
            hideCursorBar();
            pfeilEl.style.transition = "";
            pfeilEl.style.opacity = "1";
        } else {
            showCursorBar();
            pfeilEl.style.opacity = "0";
        }
    });
