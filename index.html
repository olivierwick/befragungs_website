<style>
    :root {
        --linie: 8px solid white;
        --fs: 46px;
        --pad: 1px 14px;
        --pfeil-abstand: 200px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    img { user-select: none; -webkit-user-select: none; -webkit-user-drag: none; }

    html { height: 100%; }

    body {
        background: white;
        height: 100%;
        overflow: hidden;
        font-family: Helvetica, Arial, sans-serif;
    }

    #frame { height: 100%; overflow: hidden; position: relative; }

    @keyframes einblenden { from { opacity: 0; } to { opacity: 1; } }
    @keyframes langEinblenden { from { opacity: 0; } to { opacity: 1; } }
    @keyframes cursor-puls { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes wackeln {
        0%   { transform: rotate(0deg); }
        15%  { transform: rotate(-3deg); }
        35%  { transform: rotate(3deg); }
        55%  { transform: rotate(-2deg); }
        75%  { transform: rotate(2deg); }
        100% { transform: rotate(0deg); }
    }

    #InfoButton {
        position: fixed;
        top: max(0px, env(safe-area-inset-top));
        left: 20px;
        right: 20px;
        border-bottom: var(--linie);
        text-align: center;
        padding: var(--pad);
        font-size: var(--fs);
        color: white;
        background: transparent;
        cursor: pointer;
        z-index: 10;
        filter: url(#rosenrot);
    }

    #LangButton {
        position: fixed;
        bottom: max(0px, env(safe-area-inset-bottom));
        left: 20px;
        right: 20px;
        border-top: var(--linie);
        text-align: center;
        padding: var(--pad);
        font-size: var(--fs);
        color: white;
        background: transparent;
        cursor: pointer;
        z-index: 10;
        filter: url(#rosenrot);
    }

    #container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
    }

    #content {
        display: flex;
        flex-direction: column;
        width: calc(100% - 40px);
        filter: url(#rosenrot);
    }

    #frage-nav {
        border-top: var(--linie);
        border-bottom: var(--linie);
        padding: 1px 0;
        font-size: var(--fs);
        color: white;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        user-select: none;
    }

    #frage-prev, #frage-next {
        display: block;
        position: absolute;
        top: 50%;
        height: 1.3em;
        width: 1.3em;
        object-fit: contain;
    }
    #frage-prev { left: calc(50% - var(--pfeil-abstand)); transform: translate(-50%, -50%) rotate(180deg); }
    #frage-next { left: calc(50% + var(--pfeil-abstand)); transform: translate(-50%, -50%); }
    #container[dir="rtl"] #frage-prev { left: calc(50% + var(--pfeil-abstand)); transform: translate(-50%, -50%) rotate(0deg); }
    #container[dir="rtl"] #frage-next { left: calc(50% - var(--pfeil-abstand)); transform: translate(-50%, -50%) rotate(180deg); }

    #Frage1 {
        padding: 3px 14px;
        font-size: var(--fs);
        color: white;
        text-align: center;
        line-height: 1;
        hyphens: auto;
        overflow-wrap: break-word;
    }

    #eingabe-wrapper {
        position: relative;
        border-top: var(--linie);
        border-bottom: var(--linie);
        overflow: hidden;
    }

    #Eingabe {
        background: transparent;
        border: none;
        outline: none;
        padding: 49px 14px 3px;
        font-size: var(--fs);
        font-family: Helvetica, Arial, sans-serif;
        line-height: 1;
        color: white;
        caret-color: transparent;
        width: 100%;
        resize: none;
        overflow: hidden;
        height: 144px;
        text-align: center;
        display: block;
    }

    #cursor-bar {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 10px;
        height: 90px;
        background: white;
        border-radius: 20px;
        animation: cursor-puls 2.2s ease-in-out infinite;
        pointer-events: none;
        z-index: 1;
        transition: height 0.2s ease;
        will-change: opacity;
    }

    #Submit {
        display: flex;
        justify-content: center;
        align-items: center;
        border-bottom: var(--linie);
        padding: var(--pad);
        font-size: var(--fs);
        color: white;
        text-align: center;
        cursor: pointer;
        white-space: nowrap;
    }

    #pfeil-phantom {
        display: inline-block;
        height: 0.9em;
        width: 0.9em;
        margin-right: 5px;
        flex-shrink: 0;
    }

    #pfeil {
        display: inline-block;
        height: 0.9em;
        width: 0.9em;
        margin-left: 5px;
        vertical-align: -0.05em;
        object-fit: contain;
        flex-shrink: 0;
        opacity: 0;
        will-change: opacity;
        transition: opacity 0.35s ease;
    }

    #LangView {
        display: none;
        position: fixed;
        top: 64px; bottom: 64px;
        left: 20px;
        right: 20px;
        flex-direction: column;
        justify-content: center;
        overflow-y: auto;
        z-index: 5;
        background: white;
    }
    #LangView.aktiv { display: flex; }

    .LangPill {
        border-bottom: var(--linie);
        padding: var(--pad);
        font-size: var(--fs);
        color: white;
        text-align: center;
        cursor: pointer;
        opacity: 0;
        background: transparent;
        flex-shrink: 0;
        filter: url(#rosenrot);
    }

    #InfoView {
        display: none;
        position: fixed;
        top: 64px; bottom: 64px;
        left: 20px;
        right: 20px;
        flex-direction: column;
        justify-content: center;
        overflow-x: hidden;
        overflow-y: auto;
        z-index: 5;
        background: white;
    }

    #info-content {
        width: 100%;
        filter: url(#rosenrot);
    }

    #info-nav {
        border-top: var(--linie);
        border-bottom: var(--linie);
        padding: 1px 0;
        font-size: var(--fs);
        color: white;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        user-select: none;
        flex-shrink: 0;
        white-space: nowrap;

    #info-prev, #info-next {
        display: block;
        position: absolute;
        top: 50%;
        height: 1.3em;
        width: 1.3em;
        object-fit: contain;
    }

    #InfoView[dir="rtl"] #info-next { left: calc(50% - var(--pfeil-abstand)); transform: translate(-50%, -50%) rotate(180deg); }

    #info-dropdown {
        display: none;
    }
    #info-dropdown.offen {
        display: block;
        border-top: var(--linie);
        animation: einblenden 0.2s ease forwards;
    }

    .info-menu-item {
        border-bottom: var(--linie);
        padding: var(--pad);
        font-size: var(--fs);
        color: white;
        text-align: center;
        cursor: pointer;
        opacity: 0;
        white-space: nowrap;
    }

    #info-row {
        border-bottom: var(--linie);
        padding: 3px 14px;
        font-size: var(--fs);
    }

    #info-links {
        display: none;
        border-bottom: var(--linie);
        padding: var(--pad);
        font-size: var(--fs);
        text-align: center;
    }

    .info-link-item {
        display: block;
        color: white;
        text-decoration: none;
        line-height: 1;
    }
    #info-links a:hover { animation: wackeln 0.4s ease; }

    #InfoText {
        max-width: 20ch;
        margin: 0 auto;
        padding: 3px 0;
        font-size: var(--fs);
        color: white;
        text-align: center;
        line-height: 1;
        hyphens: auto;
        overflow-wrap: break-word;
    }

    .LangPill:first-child { border-top: var(--linie); }

    #InfoText a, #Frage1 a {
        color: white;
        text-decoration: none;
        display: inline-block;
    }

    img.link-pfeil {
        height: 0.9em;
        width: 0.9em;
        margin-left: 5px;
        vertical-align: -0.05em;
        object-fit: contain;
        display: inline-block;
    }

    a.wackeln { animation: wackeln 0.5s ease; }
    #InfoText a:hover, #Frage1 a:hover { animation: wackeln 0.4s ease; }
    .qmark { display: inline-block; transform: scaleX(-1); }

@media (max-width: 430px) { :root { --fs: 38px; --pfeil-abstand: 145px; } }

}

    function addPfeilNachLinks(el) {
        el.querySelectorAll('a[href*="klybeckplus"], a[href*="olivierwick"], a[href*="zukunftklybeck"], a[href*="aefu.ch"]').forEach(function(a) {
            if (!a.querySelector('img.link-pfeil')) {
                var img = document.createElement('img');
                img.src = 'pfeil.png';
                img.className = 'link-pfeil';
                a.appendChild(img);
            }
        });
    }

    function animiereFrageText(el, html) {
        var STEP = 0.07;
        var d = 0;
        var re = /(<br\s*\/?>)|(<a\b[^>]*?>[\s\S]*?<\/a>)|(<span\b[^>]*?>[\s\S]*?<\/span>)|([^\s<]+)/g;
        var parts = [];
        var hadSpace = [];
        var prevEnd = 0;
        var m;
        while ((m = re.exec(html)) !== null) {
            hadSpace.push(m.index > prevEnd);
            prevEnd = m.index + m[0].length;
            if (/^<br/i.test(m[0])) {
                parts.push('<br>');
            } else {
                parts.push('<span style="opacity:0;animation:einblenden 0.3s ease forwards ' + d + 's">' + m[0] + '</span>');
                d += STEP;
            }
        }
        var out = '';
        for (var i = 0; i < parts.length; i++) {
            if (i > 0 && hadSpace[i] && parts[i] !== '<br>') out += ' ';
            out += parts[i];
        }
        el.innerHTML = out;
        addPfeilNachLinks(el);
        el._animVer = (el._animVer || 0) + 1;
        var ver = el._animVer;
        setTimeout(function() {
            if (el._animVer === ver) { el.innerHTML = html; addPfeilNachLinks(el); }
        }, Math.round((d + 0.3) * 1000) + 200);
    }

            document.getElementById("info-row").style.display = "none";
            document.getElementById("info-links").style.display = "none";
            dropdown.querySelectorAll(".info-menu-item").forEach(function(item, i) {
                item.style.opacity = "0";
                item.style.animation = "none";
                setTimeout(function() {
                    item.style.animation = "langEinblenden 0.4s ease forwards";
                }, i * 120);
            });
        } else {
            zeigSeite(aktiveSeite);
        }
    };

    document.querySelectorAll(".info-menu-item").forEach(function(item) {
        item.onclick = function(e) {
            e.stopPropagation();
            var key = this.dataset.key;
            if (!key) return;
            document.getElementById("info-dropdown").classList.remove("offen");
            document.getElementById("info-nav").style.display = "";
            var i = infoSeitenfolge.findIndex(function(s) { return s.key === key; });
            if (i >= 0) zeigSeite(i);
        };
    });

    document.getElementById("info-prev").onclick = function(e) {
        e.stopPropagation();
        zeigSeite((aktiveSeite - 1 + infoSeitenfolge.length) % infoSeitenfolge.length);
    };

    document.getElementById("info-next").onclick = function(e) {
        e.stopPropagation();
        zeigSeite((aktiveSeite + 1) % infoSeitenfolge.length);
    };

    document.getElementById("frage-prev").onclick = function() {
        const t = uebersetzungen[aktiveSprache];
        aktiveFrageIndex = (aktiveFrageIndex - 1 + t.fragen.length) % t.fragen.length;
        zeigeFrageAktuell();
    };

    document.getElementById("frage-next").onclick = function() {
        const t = uebersetzungen[aktiveSprache];
        aktiveFrageIndex = (aktiveFrageIndex + 1) % t.fragen.length;
        zeigeFrageAktuell();
    };

    document.getElementById("Submit").onclick = function() {
        const text = document.getElementById("Eingabe").value.trim();
        const t = uebersetzungen[aktiveSprache];
        const submitText = document.getElementById("SubmitText");
        if (text === "") {
            animiereFrageText(submitText, t.leer);
            setTimeout(function() {
                submitText.textContent = t.absenden;
            }, 3000);
            return;
        }
        document.getElementById("Eingabe").value = "";
        showCursorBar();
        pfeilEl.style.transition = "none";
        pfeilEl.style.opacity = "0";
        submitText.textContent = t.danke;
        setTimeout(function() { submitText.textContent = t.absenden; }, 3000);
        const fragenText = uebersetzungen.de.fragen[aktiveFrageIndex].replace(/<[^>]*>/g, '').replace(/\s+/g, ' ').trim();
        fetch("/absenden", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: text, frage: fragenText })
        });
    };

    var barEl = document.getElementById("cursor-bar");
    var pfeilEl = document.getElementById("pfeil");

    function showCursorBar() {
        barEl.style.opacity = "";
        barEl.style.animation = "cursor-puls 2.2s ease-in-out infinite";
    }
    function hideCursorBar() {
        barEl.style.animation = "none";
        barEl.style.opacity = "0";
    }

    document.getElementById("Eingabe").addEventListener("keydown", function(e) {
        const ta = this;
        const pos = ta.selectionStart;
        const lines = ta.value.split('\n');

        let lineStart = 0;
        let lineIndex = 0;
        for (let i = 0; i < lines.length; i++) {
            if (pos <= lineStart + lines[i].length) { lineIndex = i; break; }
            lineStart += lines[i].length + 1;
        }
        const posInLine = pos - lineStart;

        if (e.key === 'Enter') return;

        if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && posInLine >= 20) {
            e.preventDefault();
            const before = ta.value.slice(0, pos);
            const after = ta.value.slice(ta.selectionEnd);
            ta.value = before + '\n' + e.key + after;
            ta.selectionStart = ta.selectionEnd = pos + 2;
            ta.dispatchEvent(new Event('input'));
        }
    });

    document.getElementById("Eingabe").addEventListener("input", function() {
        if (this.value) {
            hideCursorBar();
            pfeilEl.style.transition = "";
            pfeilEl.style.opacity = "1";
        } else {
            showCursorBar();
            pfeilEl.style.opacity = "0";
        }
    });

    document.getElementById("Eingabe").addEventListener("focus", function() {
        if (!this.value) {
            barEl.style.opacity = "";
            barEl.style.animation = "none";
            barEl.style.height = "120px";
            requestAnimationFrame(function() {
                requestAnimationFrame(function() {
                    barEl.style.animation = "cursor-puls 1.1s ease-in-out infinite";
                });
            });
        }
    });

    document.getElementById("Eingabe").addEventListener("blur", function() {
        barEl.style.height = "90px";
        if (!this.value) {
            barEl.style.animation = "none";
            requestAnimationFrame(function() {
                requestAnimationFrame(function() {
                    barEl.style.animation = "cursor-puls 2.2s ease-in-out infinite";
                });
            });
        }
    });

    setInterval(function() {
        document.querySelectorAll("a").forEach(function(a) {
            if (a.textContent.trim().includes("Plus")) {
                a.classList.add("wackeln");
                setTimeout(function() { a.classList.remove("wackeln"); }, 500);
            }
        });
    }, 10000);

    spracheWechseln("de");


</script>
</html>
